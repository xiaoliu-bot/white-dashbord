<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智瞰 · 实时财经看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0B; --card:#141417; --card2:#0F0F12; --border:#27272A;
    --text:#FAFAFA; --muted:#A1A1AA; --faint:#71717A;
    --red:#F43F5E; --red-soft:rgba(244,63,94,.14);
    --green:#10B981; --green-soft:rgba(16,185,129,.14);
    --gold:#F5B301; --gold-soft:rgba(245,179,1,.14);
    --line:#333344;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    padding:24px 16px 40px; min-height:100vh;
  }
  .wrap{width:100%;max-width:1376px;margin:0 auto;}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}

  /* Header */
  .head{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;background:var(--card);border:1px solid var(--border);
    border-radius:10px;margin-bottom:18px;flex-wrap:wrap;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .logo{width:30px;height:30px;border-radius:8px;
    background:linear-gradient(135deg,#F43F5E,#F5B301);display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;color:#0A0A0B;}
  .brand .t1{font-size:18px;font-weight:700;letter-spacing:.3px;}
  .brand .t2{font-size:12px;color:var(--faint);}
  .status{display:flex;align-items:center;gap:16px;}
  .live{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:500;}
  .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.55);}70%{box-shadow:0 0 0 8px rgba(34,197,94,0);}100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}}
  .clock{font-size:12px;color:var(--faint);}

  section{margin-bottom:18px;}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;margin:0 4px 12px;}
  .sec-title{font-size:15px;font-weight:600;letter-spacing:.4px;}
  .sec-title::before{content:"";display:inline-block;width:4px;height:15px;background:var(--red);
    border-radius:2px;margin-right:9px;vertical-align:-2px;}
  .sec-sub{font-size:12px;color:var(--faint);}

  /* M1 Indices */
  .indices{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .icard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
  .icard .row1{display:flex;align-items:center;justify-content:space-between;}
  .icard .iname{font-size:14px;font-weight:600;}
  .icard .icode{font-size:11px;color:var(--faint);background:#1c1c20;padding:2px 7px;border-radius:5px;}
  .icard .ival{font-size:30px;font-weight:700;margin:10px 0 4px;}
  .icard .ichg{font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:5px;}
  .icard .ispark{margin-top:10px;}
  .up{color:var(--red);} .down{color:var(--green);}

  /* M2 Sectors */
  .sectors{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .stile{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:13px 14px;
    display:flex;flex-direction:column;gap:6px;transition:border-color .4s,box-shadow .4s;}
  .stile.hot{border-color:var(--red);box-shadow:0 0 0 1px var(--red-soft),0 4px 16px rgba(244,63,94,.10);}
  .stile .sname{font-size:13px;font-weight:600;}
  .stile .schg{font-size:16px;font-weight:700;}
  .stile .stag{font-size:10px;color:var(--faint);}
  .stile .stag.hot{color:var(--red);}

  /* M3 Gold */
  .gold{display:grid;grid-template-columns:300px 1fr;gap:16px;background:var(--card);
    border:1px solid var(--border);border-radius:10px;padding:18px;}
  .gold .gleft{display:flex;flex-direction:column;justify-content:center;gap:8px;}
  .gold .gname{font-size:14px;color:var(--muted);}
  .gold .gprice{font-size:34px;font-weight:700;color:var(--gold);}
  .gold .gunit{font-size:13px;color:var(--faint);}
  .gold .gchg{font-size:14px;font-weight:700;}
  .gold .gchart{width:100%;}

  /* M4 Bubbles */
  .bubwrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .panel{position:relative;width:100%;height:520px;background:var(--card2);
    border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .center-line{position:absolute;left:0;right:0;top:260px;height:1px;background:var(--line);}
  .legend{position:absolute;left:24px;top:242px;font-size:12px;font-weight:600;}
  .legend.in{color:var(--red);}
  .legend.out{position:absolute;right:24px;left:auto;color:var(--green);}
  .bubble{position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;text-align:center;
    transition:left .85s cubic-bezier(.22,.61,.36,1),top .85s cubic-bezier(.22,.61,.36,1),
      width .85s cubic-bezier(.22,.61,.36,1),height .85s cubic-bezier(.22,.61,.36,1);
    box-shadow:inset -6px -8px 18px rgba(0,0,0,.35),inset 4px 5px 14px rgba(255,255,255,.18),0 6px 18px rgba(0,0,0,.45);
    will-change:left,top,width,height;}
  .bubble.red{background:radial-gradient(circle at 34% 30%,#FF738C,#D11A33);}
  .bubble.green{background:radial-gradient(circle at 34% 30%,#33D49C,#05864F);}
  .bubble .name{font-size:11px;font-weight:700;line-height:1.1;text-shadow:0 1px 2px rgba(0,0,0,.4);padding:0 4px;}
  .bubble .amt{font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:700;font-size:10px;line-height:1.2;
    text-shadow:0 1px 2px rgba(0,0,0,.4);}

  .foot{margin-top:6px;font-size:12px;color:var(--faint);display:flex;justify-content:space-between;
    flex-wrap:wrap;gap:10px;border-top:1px solid var(--border);padding-top:14px;}
  .note{font-size:11px;color:#52525B;}

  @media(max-width:900px){
    .indices{grid-template-columns:1fr;}
    .sectors{grid-template-columns:repeat(2,1fr);}
    .gold{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <div class="brand">
      <div class="logo">智</div>
      <div>
        <div class="t1">智瞰 · 实时财经看板</div>
        <div class="t2">Market Monitor Dashboard</div>
      </div>
    </div>
    <div class="status">
      <span class="live"><span class="dot"></span>LIVE</span>
      <span class="clock mono" id="clock">--:--:--</span>
    </div>
  </div>

  <!-- M1 大盘指数 -->
  <section>
    <div class="sec-head">
      <div class="sec-title">大盘指数</div>
      <div class="sec-sub">上证 · 纳斯达克 · 恒生科技</div>
    </div>
    <div class="indices" id="indices"></div>
  </section>

  <!-- M2 板块异动 -->
  <section>
    <div class="sec-head">
      <div class="sec-title">板块异动看板</div>
      <div class="sec-sub">吸筹 + 上涨 标红 · 共 11 个板块</div>
    </div>
    <div class="sectors" id="sectors"></div>
  </section>

  <!-- M3 黄金 -->
  <section>
    <div class="sec-head">
      <div class="sec-title">黄金实时金价</div>
      <div class="sec-sub">实时金价 + 两周走势预测</div>
    </div>
    <div class="gold">
      <div class="gleft">
        <div class="gname">国际金价 / 国内含税</div>
        <div><span class="gprice mono" id="goldPrice">--</span> <span class="gunit">元/克</span></div>
        <div class="gchg mono" id="goldChg">--</div>
      </div>
      <div class="gchart" id="goldChart"></div>
    </div>
  </section>

  <!-- M4 气泡图 -->
  <section>
    <div class="sec-head">
      <div class="sec-title">板块资金流 · 气泡图</div>
      <div class="sec-sub">球径 ∝ 资金绝对值 · 红=流入 绿=流出 · 每 2.2s 刷新</div>
    </div>
    <div class="bubwrap">
      <div class="panel" id="panel">
        <div class="center-line"></div>
        <div class="legend in">↑ 资金净流入（吸筹）</div>
        <div class="legend out">↓ 资金净流出（出货）</div>
      </div>
    </div>
  </section>

  <div class="foot">
    <span>● 数据自动刷新中 · 每 2.2s</span>
    <span>● 红=涨/吸筹 · 绿=跌/出货 · 金=黄金</span>
    <span class="note">* 本看板为设计稿动态演示，数据为模拟实时流，不构成投资建议</span>
  </div>

</div>

<script>
  /* ---------- 工具 ---------- */
  const $ = s => document.querySelector(s);
  const rnd = (a,b)=>a+Math.random()*(b-a);
  const walk = (v,step,min,max)=>{ v += rnd(-step,step); return Math.max(min,Math.min(max,v)); };
  function genSeries(n, base, vol){
    const a=[]; let v=base;
    for(let i=0;i<n;i++){ v += rnd(-vol,vol); a.push(v); }
    return a;
  }
  function spark(arr, w, h, color){
    const min=Math.min(...arr), max=Math.max(...arr), rng=(max-min)||1;
    const pts = arr.map((v,i)=>{
      const x = (i/(arr.length-1))*w;
      const y = h - ((v-min)/rng)*(h-6) - 3;
      return x.toFixed(1)+','+y.toFixed(1);
    }).join(' ');
    return `<svg class="ispark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6"
        stroke-linejoin="round" stroke-linecap="round"/></svg>`;
  }

  /* ---------- M1 大盘指数 ---------- */
  const indices = [
    {name:'上证指数', code:'SH', value:3215.67, chg:0.82,  hist:genSeries(22,3212,7)},
    {name:'纳斯达克', code:'IXIC', value:17345.20, chg:-0.45, hist:genSeries(22,17380,38)},
    {name:'恒生科技', code:'HSTECH', value:4087.35, chg:1.36, hist:genSeries(22,4072,16)},
  ];
  const idxBox = $('#indices');
  indices.forEach((d,i)=>{
    const el=document.createElement('div'); el.className='icard';
    el.innerHTML=`<div class="row1"><span class="iname">${d.name}</span><span class="icode">${d.code}</span></div>
      <div class="ival mono">${d.value.toFixed(2)}</div>
      <div class="ichg mono" id="ichg${i}"></div>
      <div id="ispark${i}"></div>`;
    idxBox.appendChild(el);
  });
  function renderIndices(){
    indices.forEach((d,i)=>{
      const up = d.chg>=0;
      $('#indices').children[i].querySelector('.ival').textContent = d.value.toFixed(2);
      const c = $('#ichg'+i);
      c.className = 'ichg mono ' + (up?'up':'down');
      c.textContent = (up?'▲ +':'▼ ') + d.chg.toFixed(2) + '%';
      $('#ispark'+i).innerHTML = spark(d.hist, 360, 36, up?'#F43F5E':'#10B981');
    });
  }

  /* ---------- M2 板块异动 ---------- */
  const sectors = [
    {name:'半导体', chg:2.84, inflow:true},
    {name:'芯片', chg:2.31, inflow:true},
    {name:'CPO', chg:1.97, inflow:true},
    {name:'科创创业AI', chg:1.62, inflow:true},
    {name:'机器人', chg:1.28, inflow:true},
    {name:'PCB', chg:1.05, inflow:true},
    {name:'细分化工', chg:-0.74, inflow:false},
    {name:'新能源电池', chg:-1.12, inflow:false},
    {name:'恒生科技', chg:-0.63, inflow:false},
    {name:'创新药', chg:-0.91, inflow:false},
    {name:'锂矿', chg:-1.46, inflow:false},
  ];
  const secBox = $('#sectors');
  sectors.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='stile'+(d.inflow?' hot':'');
    el.innerHTML=`<div class="sname">${d.name}</div>
      <div class="schg mono" id="schg${i}"></div>
      <div class="stag ${d.inflow?'hot':''}" id="stag${i}">${d.inflow?'吸筹 · 上涨':'净流出'}</div>`;
    secBox.appendChild(el);
  });
  function renderSectors(){
    sectors.forEach((d,i)=>{
      const up=d.chg>=0;
      const c=$('#schg'+i);
      c.className='schg mono '+(up?'up':'down');
      c.textContent=(up?'+':'')+d.chg.toFixed(2)+'%';
    });
  }

  /* ---------- M3 黄金 ---------- */
  const gold = {price:2385.60, chg:0.38, hist:genSeries(14,2372,7)};
  function renderGold(){
    $('#goldPrice').textContent = gold.price.toFixed(2);
    const up = gold.chg>=0;
    const c=$('#goldChg'); c.className='gchg mono '+(up?'up':'down');
    c.textContent=(up?'▲ +':'▼ ')+gold.chg.toFixed(2)+'% 今日';
    $('#goldChart').innerHTML = goldChartSVG(gold.hist, 560, 240);
  }
  function goldChartSVG(hist, w, h){
    const min=Math.min(...hist), max=Math.max(...hist), rng=(max-min)||1;
    const pad=14;
    const X = i => pad + (i/(hist.length-1))*(w-2*pad);
    const Y = v => h-pad - ((v-min)/rng)*(h-2*pad);
    const pts = hist.map((v,i)=>X(i).toFixed(1)+','+Y(v).toFixed(1)).join(' ');
    // 预测：沿末端趋势外推 5 点
    const n=hist.length, last=hist[n-1], prev=hist[n-2];
    const slope=(last-prev)/((rng)*0)+ (last-prev); // 简化斜率
    let pv=last, pred=[];
    for(let i=1;i<=5;i++){ pv += (last-prev)*0.6 + rnd(-3,3); pred.push(pv); }
    const allX = hist.length+pred.length-1;
    const Xp = i => pad + (i/(allX-1))*(w-2*pad);
    const predPts = pred.map((v,i)=>Xp(n-1+i+1).toFixed(1)+','+Y(Math.max(min,Math.min(max,v))).toFixed(1)).join(' ');
    const areaPts = `M ${X(0).toFixed(1)} ${(h-pad).toFixed(1)} L ` +
      hist.map((v,i)=>X(i).toFixed(1)+','+Y(v).toFixed(1)).join(' L ') +
      ` L ${X(n-1).toFixed(1)} ${(h-pad).toFixed(1)} Z`;
    return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs><linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#F5B301" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#F5B301" stop-opacity="0"/></linearGradient></defs>
      <path d="${areaPts}" fill="url(#gg)"/>
      <polyline points="${pts}" fill="none" stroke="#F5B301" stroke-width="2" stroke-linejoin="round"/>
      <polyline points="${pts.split(' ').pop()+' '+predPts}" fill="none" stroke="#F5B301"
        stroke-width="2" stroke-dasharray="5 4" opacity="0.7"/>
    </svg>`;
  }

  /* ---------- M4 气泡图 ---------- */
  const red = [
    {name:'半导体', v:42.3},{name:'芯片', v:31.5},{name:'CPO', v:25.8},
    {name:'科创创业AI', v:20.1},{name:'机器人', v:16.4},{name:'PCB', v:13.7},
  ];
  const green = [
    {name:'锂矿', v:-36.8},{name:'新能源电池', v:-22.1},{name:'细分化工', v:-18.5},
    {name:'恒生科技', v:-12.3},{name:'创新药', v:-9.8},
  ];
  const panel = $('#panel');
  const SCALE = 9.85;
  const radius = v => Math.max(28, SCALE*Math.sqrt(Math.abs(v)));
  function makeBubble(d, group){
    const el=document.createElement('div'); el.className='bubble '+group;
    el.innerHTML='<span class="name"></span><span class="amt"></span>';
    panel.appendChild(el); d.el=el; d.group=group;
  }
  red.forEach(d=>makeBubble(d,'red'));
  green.forEach(d=>makeBubble(d,'green'));
  function layoutBubbles(group, list){
    const W=panel.clientWidth, cx=W/2, cy=group==='red'?130:390, margin=70;
    const sorted=[...list].sort((a,b)=>Math.abs(b.v)-Math.abs(a.v));
    const n=sorted.length, gap=Math.min(215,(W-2*margin)/n);
    sorted.forEach((d,i)=>{
      const r=radius(d.v);
      let x = i===0 ? cx : cx + ((i%2===1?-1:1))*Math.ceil(i/2)*gap;
      x=Math.max(margin,Math.min(W-margin,x));
      d.el.style.width=(r*2)+'px'; d.el.style.height=(r*2)+'px';
      d.el.style.left=(x-r)+'px'; d.el.style.top=(cy-r)+'px';
      d.el.querySelector('.name').textContent=d.name;
      d.el.querySelector('.amt').textContent=(d.v>=0?'+':'-')+Math.abs(d.v).toFixed(1)+'亿';
    });
  }
  function renderBubbles(){
    [...red,...green].forEach(d=>{
      d.v=walk(d.v,4.2,6,48);
      if(d.group==='red'&&d.v<6) d.v=rnd(6,8);
      if(d.group==='green'&&d.v>-6) d.v=-rnd(6,8);
    });
    layoutBubbles('red',red); layoutBubbles('green',green);
  }

  /* ---------- 主循环 ---------- */
  function tick(){
    indices.forEach(d=>{
      d.value = walk(d.value, d.value*0.0009, d.value*0.97, d.value*1.03);
      d.chg = walk(d.chg, 0.12, -2.5, 2.8);
      d.hist.push(d.value); d.hist.shift();
    });
    sectors.forEach(d=>{ d.chg = walk(d.chg, 0.18, -2.6, 3.2); });
    gold.price = walk(gold.price, 1.4, 2300, 2460);
    gold.chg = walk(gold.chg, 0.08, -1.5, 1.8);
    gold.hist.push(gold.price); gold.hist.shift();
    renderIndices(); renderSectors(); renderGold(); renderBubbles();
    const t=new Date();
    $('#clock').textContent='最近更新 '+t.toTimeString().slice(0,8);
  }
  tick();
  setInterval(tick, 2200);
  setInterval(()=>{ const t=new Date(); $('#clock').textContent='最近更新 '+t.toTimeString().slice(0,8); }, 1000);
  window.addEventListener('resize', ()=>{ layoutBubbles('red',red); layoutBubbles('green',green); });
</script>
</body>
</html>
