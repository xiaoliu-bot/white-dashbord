name: Daily Market Data Fetch

on:
  schedule:
    # 每 5 分钟抓取一次（北京时间约 09:00–17:55，周一~周五；覆盖收盘后中金所持仓排名发布）
    - cron: '*/5 1-9 * * 1-5'
  workflow_dispatch:
  repository_dispatch:
    types: [fetch-data]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare tushare jqdatasdk -q

      - name: Fetch data
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          JQ_USER: ${{ secrets.JQ_USER }}
          JQ_PASSWORD: ${{ secrets.JQ_PASSWORD }}
        run: python fetch_data.py

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://xiaoliu-bot:${{ secrets.GH_PAT }}@github.com/xiaoliu-bot/white-dashbord.git

      - name: Commit and push
        run: |
          # 检查是否有变化（不依赖退出码，避免 set -e 问题）
          CHANGES=$(git status --porcelain api/data.json api/history/)
          if [ -n "$CHANGES" ]; then
            DATE=$(date '+%Y-%m-%d')
            TS=$(date '+%H:%M')
            git add api/data.json api/history/
            git commit -m "📊 数据快照 $DATE $TS"
            git push
            echo "✅ 推送成功"
          else
            echo "无变化，跳过推送"
          fi
