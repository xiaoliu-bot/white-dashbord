name: Update Market Data

on:
  schedule:
    # 北京时间 11:40, 15:10, 21:40
    - cron: '40 3 * * 1-5'
    - cron: '10 7 * * 1-5'
    - cron: '40 13 * * 1-5'
  workflow_dispatch:
  repository_dispatch:
    types: [update-data]

permissions:
  contents: write
  pull-requests: none

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            api/data.json
            scripts/fetch_data.py
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tushare requests

      - name: Fetch market data
        run: python scripts/fetch_data.py
        continue-on-error: true

      - name: Update data.json via GitHub API
        run: python scripts/github_push.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
